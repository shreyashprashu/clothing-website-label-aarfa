<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Label Aarfa — Handcrafted Ethnic Wear from Delhi | Est. 2019</title>
    <meta name="description" content="Label Aarfa is a Delhi atelier crafting handmade kurtas, coord sets, and stitched suits since 2019. Slow couture in handloom cotton, soft crepe, silk, and pashmina. Free shipping over ₹2,999." />
    <meta name="keywords" content="Label Aarfa, ethnic wear, kurta sets, coord sets, stitched suits, designer kurtas, Pakistani cordsets, handloom cotton, Delhi designer, Indian women's clothing, festive wear" />
    <meta name="author" content="Label Aarfa" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Label Aarfa" />
    <meta property="og:title" content="Label Aarfa — Handcrafted Ethnic Wear from Delhi | Est. 2019" />
    <meta property="og:description" content="A Delhi atelier crafting handmade kurtas, coord sets, and stitched suits since 2019. Slow couture, made by hand." />
    <meta property="og:url" content="https://www.labelaarfa.com/" />
    <meta property="og:image" content="https://www.labelaarfa.com/images/products/premium-1-1.jpg" />
    <meta property="og:image:alt" content="Label Aarfa premium berry-crepe kaftan set" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Label Aarfa — Handcrafted Ethnic Wear from Delhi | Est. 2019" />
    <meta name="twitter:description" content="A Delhi atelier crafting handmade kurtas, coord sets, and stitched suits since 2019." />
    <meta name="twitter:image" content="https://www.labelaarfa.com/images/products/premium-1-1.jpg" />

    <!-- Preconnect + stylesheet — loaded from <head> so the browser starts the
         font fetch immediately, rather than after React parses (was @import'd
         inside an inline <style> tag, which is render-blocking + late). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" />

    <!-- LCP hero image — preload the WebP variants of the first hero slide
         so it starts loading before the JS bundle parses. Browsers ignore
         this if they don't support imagesrcset and fall through to the
         regular <picture>. Keep this in sync with Hero slides[0].image. -->
    <link rel="preload" as="image" type="image/webp"
      imagesrcset="/images/products/premium-1-1.400.webp 400w, /images/products/premium-1-1.800.webp 800w, /images/products/premium-1-1.1280.webp 1280w"
      imagesizes="(min-width: 1024px) 58vw, 100vw"
      fetchpriority="high" />

    <!-- Organization schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Label Aarfa",
      "alternateName": "Label Aarfa Couture",
      "url": "https://www.labelaarfa.com/",
      "logo": "https://www.labelaarfa.com/logo.svg",
      "image": "https://www.labelaarfa.com/logo.svg",
      "description": "Handcrafted ethnic wear from a Delhi atelier, established 2019. Stitched kurtas, coord sets, and Pakistani-inspired suits.",
      "foundingDate": "2019",
      "founder": { "@type": "Person", "name": "Aarfa" },
      "slogan": "Fashion Redefined",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "New Delhi",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "care@labelaarfa.com",
        "contactType": "customer service",
        "areaServed": ["IN", "US", "GB", "AE", "CA", "AU"],
        "availableLanguage": ["English", "Hindi"]
      },
      "sameAs": [
        "https://www.instagram.com/labelaarfa",
        "https://www.facebook.com/labelaarfa"
      ]
    }
    </script>

    <!-- LocalBusiness schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Label Aarfa",
      "image": "https://www.labelaarfa.com/logo.svg",
      "@id": "https://www.labelaarfa.com/",
      "url": "https://www.labelaarfa.com/",
      "telephone": "+91-83688-07626",
      "email": "care@labelaarfa.com",
      "priceRange": "₹₹",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "New Delhi",
        "addressCountry": "IN"
      },
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "11:00",
        "closes": "20:00"
      }]
    }
    </script>

    <!-- WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Label Aarfa",
      "url": "https://www.labelaarfa.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.labelaarfa.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>

</html>
